<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7C3AED"><title>Aoife's Judo Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{font-family:'Nunito',sans-serif;background:#fefefe;color:#333;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:background .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.hdr{padding:8px 12px;display:flex;align-items:center;gap:6;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:3px solid;flex-shrink:0;z-index:10}.btn{cursor:pointer;border:none;color:#fff;border-radius:8px;padding:5px 10px;font-family:'Lilita One',cursive;font-size:11px;display:flex;align-items:center;gap:3;box-shadow:0 2px 6px rgba(0,0,0,.1)}.btn:active{transform:scale(.95)}.ht{flex:1;text-align:center;font-family:'Lilita One',cursive;font-size:10px}.pr{position:relative;width:34px;height:34px;flex-shrink:0}.pr svg{width:34px;height:34px}.pr .l{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:9px}
.ov{position:absolute;inset:0;z-index:100}.ob{position:absolute;inset:0;background:rgba(0,0,0,.4)}.np{position:relative;z-index:1;background:#fff;border-radius:0 0 18px 18px;max-height:85dvh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideDown .2s}.nh{padding:12px;font-family:'Lilita One',cursive;font-size:16px;color:#333}.nl{padding:2px 8px 10px;display:flex;flex-direction:column;gap:2px}.ni{cursor:pointer;border:none;border-radius:8px;text-align:left;padding:8px 10px;font-family:'Nunito',sans-serif}.ni:active{transform:scale(.97)}.ni.lk{opacity:.35;pointer-events:none}.nr{display:flex;align-items:center;gap:6;font-weight:800;font-size:11px}
.ct{flex:1;overflow-y:auto;padding:12px 10px 95px;transition:opacity .2s}.ct.an{opacity:0}.ct::-webkit-scrollbar{width:3px}.ct::-webkit-scrollbar-thumb{background:rgba(0,0,0,.06);border-radius:2px}
.chd{border-radius:16px;padding:18px 16px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden;animation:fadeIn .3s}.chd .bi{position:absolute;top:-8px;right:-8px;font-size:70px;opacity:.1;transform:rotate(15deg)}.chd .cn{font-size:9px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}.chd .tt{font-family:'Lilita One',cursive;font-size:20px;line-height:1.15;margin-bottom:2px}.chd .st{font-size:11px;opacity:.9;font-weight:600}
.cd{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);animation:fadeIn .3s}.ci{font-size:12px;line-height:1.65;font-weight:600;color:#444;border-left:3px solid;padding-left:10px}
.at{background:linear-gradient(135deg,#fdf2f8,#fce7f3);border:2px solid #f9a8d4;border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:11px;font-weight:700;color:#9d174d;line-height:1.45}.at .al{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#be185d;margin-bottom:1px}
.bt{font-size:12px;line-height:1.65;font-weight:500;color:#444;margin-bottom:3px}.bt b{color:#111;font-weight:800}.bt u{text-decoration:none;color:#1d4ed8;font-weight:700}
.sl{font-family:'Lilita One',cursive;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:5}.sb{font-size:8px;font-family:'Nunito',sans-serif;font-weight:700;padding:1px 6px;border-radius:5px}
.si{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px}.si:active{transform:scale(.98)}.sx{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900;margin-top:1px}.se{font-size:11px;font-weight:600;line-height:1.4}.se.dn{color:#aaa;text-decoration:line-through}
.fc{border-radius:10px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8}.fc .fi{font-size:20px;flex-shrink:0}.fc .fl{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:1px}.fc .ft{font-size:11px;font-weight:700;line-height:1.35}.fk{background:#1a1a2e;color:#fff}.fk .fl{color:#a78bfa}.fj{background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff}.fj .fl{color:#FCA5A5}
.dr{cursor:pointer;border-radius:7px;padding:7px 9px;font-family:inherit;font-size:10px;font-weight:700;text-align:left;width:100%;display:flex;align-items:center;gap:6;margin-bottom:4px;border:2px solid}.dr:active{transform:scale(.98)}.dl{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:1px}
.qs{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:3px solid}.qtl{font-family:'Lilita One',cursive;font-size:14px;text-align:center}.qsb{font-size:10px;font-weight:600;color:#666;text-align:center;margin-bottom:10px}.qq{font-weight:800;font-size:12px;margin:10px 0 4px;color:#333}.qa{cursor:pointer;border:2px solid #e5e7eb;border-radius:7px;padding:8px 10px;margin-bottom:4px;font-size:11px;font-weight:700}.qa:active{transform:scale(.98)}.qa.ok{background:#dcfce7;border-color:#22c55e;color:#166534;pointer-events:none}.qa.no{background:#fee2e2;border-color:#ef4444;color:#991b1b;animation:shake .4s;pointer-events:none}.qa.ds{pointer-events:none;opacity:.5}
.cap{background:linear-gradient(135deg,#fde68a,#fbbf24);border:4px solid #f59e0b;border-radius:18px;padding:18px;margin-bottom:10px;text-align:center}.cap .em{font-size:56px;animation:pulse 1.5s infinite}.cap h2{font-family:'Lilita One',cursive;font-size:18px;color:#92400e;margin:6px 0 2px}.cap p{font-size:11px;color:#a16207;font-weight:600}
.bn{position:absolute;bottom:0;left:0;right:0;padding:6px 12px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(255,255,255,.98) 60%,transparent);z-index:10}.ar{cursor:pointer;border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.08);color:#fff}.ar:active{transform:scale(.9)}.ar:disabled{opacity:.3}.dts{display:flex;gap:2px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:55%}.dt{height:5px;border-radius:3px;border:none;cursor:pointer;transition:width .3s,background .3s}
</style>
</head><body><div id="app"></div>
<script src="data.js"></script>
<script>
// Register service worker
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

let ac=0,cs={},dd={},sn=false,am=false,qa={},passed={},sp=0;
function ld(){try{const s=localStorage.getItem('aj9');if(s){const d=JSON.parse(s);cs=d.c||{};dd=d.d||{};qa=d.q||{};passed=d.p||{}}}catch(e){}}
function sv(){try{localStorage.setItem('aj9',JSON.stringify({c:cs,d:dd,q:qa,p:passed}))}catch(e){}}
function rst(){if(confirm('Reset ALL progress? Cannot be undone!')){localStorage.removeItem('aj9');cs={};dd={};qa={};passed={};ac=0;sn=false;rn()}}
ld();
function ul(i){return i===0||!!passed[CH[i-1].id]}
function qsc(cid){const c=CH.find(x=>x.id===cid);if(!c||!c.quiz)return{d:0,ok:0,t:0};let d=0,ok=0;c.quiz.forEach((_,i)=>{const k=cid+'-'+i;if(qa[k]!==undefined){d++;if(qa[k]===c.quiz[i].c)ok++}});return{d,ok,t:c.quiz.length}}
function gp(){let t=0,d=0;CH.forEach(c=>{t+=c.steps.length+2;d+=(cs[c.id]||[]).length+(dd[c.id+'-p']?1:0)+(dd[c.id+'-s']?1:0)});return Math.round((d/t)*100)}
function ts(id,i){if(!cs[id])cs[id]=[];const a=cs[id],x=a.indexOf(i);if(x===-1)a.push(i);else a.splice(x,1);sv();rn(1)}
function td(k){dd[k]=!dd[k];sv();rn(1)}
function nv(i){if(i===ac||am||i<0||i>=CH.length||!ul(i))return;am=1;rn();setTimeout(()=>{ac=i;sn=false;am=0;rn();document.getElementById('ct')?.scrollTo({top:0})},150)}
function aq(ci,qi,ai){if(qa[ci+'-'+qi]!==undefined)return;qa[ci+'-'+qi]=ai;const s=qsc(ci);if(s.d===s.t&&s.ok===s.t)passed[ci]=true;sv();rn(1)}
function rq(ci){CH.find(x=>x.id===ci)?.quiz?.forEach((_,i)=>{delete qa[ci+'-'+i]});delete passed[ci];sv();rn(1)}

function rn(keep){
const ct=document.getElementById('ct');if(keep&&ct)sp=ct.scrollTop;
const c=CH[ac],p=gp(),dn=cs[c.id]||[],allP=CH.every(x=>!!passed[x.id]);
const a=document.getElementById('app');
a.style.background=`linear-gradient(135deg,${c.color}10,${c.color}05,#fefefe)`;
let h='';
if(allP)h+=`<div style="text-align:center;padding:3px;background:linear-gradient(90deg,#fde68a,#fbbf24,#fde68a);font-family:'Lilita One',cursive;font-size:10px;color:#92400e;flex-shrink:0">🏆🐹 GOLDEN CAPYBARA EARNED! 🐹🏆</div>`;
h+=`<div class="hdr" style="border-bottom-color:${c.color}"><button class="btn" style="background:${c.color}" onclick="sn=!sn;rn()">🥋</button><div class="ht" style="color:${c.color}">AOIFE'S JUDO GUIDE</div><button class="btn" style="background:#94a3b8;font-size:9px;padding:3px 7px" onclick="rst()">🔄</button><div class="pr"><svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="13" fill="none" stroke="#e5e7eb" stroke-width="2.5"/><circle cx="17" cy="17" r="13" fill="none" stroke="${c.color}" stroke-width="2.5" stroke-dasharray="${(p/100)*81.7} 81.7" stroke-linecap="round" transform="rotate(-90 17 17)"/></svg><div class="l" style="color:${c.color}">${p}%</div></div></div>`;
if(sn){h+=`<div class="ov"><div class="ob" onclick="sn=0;rn()"></div><div class="np"><div class="nh">📖 Chapters (${Object.keys(passed).length}/${CH.length} passed)</div><div class="nl">`;
CH.forEach((x,i)=>{const u=ul(i),v=i===ac,ps=passed[x.id];h+=`<button class="ni ${u?'':'lk'}" onclick="nv(${i})" style="background:${v?`linear-gradient(135deg,${x.color},${x.color}CC)`:x.color+'10'};color:${v?'#fff':'#333'}"><div class="nr"><span style="font-size:14px">${u?x.icon:'🔒'}</span><span style="flex:1;font-size:10px">${x.title}</span>${ps?'✅':''}</div></button>`});
h+=`<button onclick="rst()" style="width:100%;text-align:center;margin-top:6px;border:2px solid #e5e7eb;background:#fff;border-radius:8px;padding:6px;font-family:'Lilita One',cursive;font-size:10px;color:#888;cursor:pointer">🔄 Reset All Progress</button>`;
h+=`</div></div></div>`}
h+=`<div id="ct" class="ct ${am?'an':''}">`;
if(allP)h+=`<div class="cap"><div class="em">🏆🐹🏆</div><h2>GOLDEN CAPYBARA!</h2><p>You completed EVERYTHING! Aoife, you are INCREDIBLE!</p></div>`;
h+=`<div class="chd" style="background:linear-gradient(135deg,${c.color},${c.color}DD)"><div class="bi">${c.icon}</div><div class="cn">Chapter ${ac+1} of ${CH.length}</div><div class="tt">${c.icon} ${c.title}</div><div class="st">${c.subtitle}</div></div>`;
h+=`<div class="cd ci" style="border-left-color:${c.color}">${c.intro}</div>`;
if(c.aoife)h+=`<div class="at"><div class="al">📣 Aoife!</div>${c.aoife}</div>`;
if(c.body&&c.body.length){h+=`<div class="cd">`;c.body.forEach(ln=>{h+=ln===''?'<div style="height:8px"></div>':`<div class="bt">${ln}</div>`});h+=`</div>`}
h+=`<div class="cd"><div class="sl" style="color:${c.color}">✅ I Understand <span class="sb" style="background:${c.color}15;color:${c.color}">${dn.length}/${c.steps.length}</span></div>`;
c.steps.forEach((s,i)=>{const d=dn.includes(i);h+=`<div class="si" onclick="ts('${c.id}',${i})" style="background:${d?c.color+'10':'#f8f9fa'};border:2px solid ${d?c.color:'transparent'}"><div class="sx" style="border-color:${d?c.color:'#ccc'};background:${d?c.color:'transparent'}">${d?'✓':''}</div><span class="se${d?' dn':''}">${s}</span></div>`});
h+=`</div>`;
h+=`<div class="fc" style="background:linear-gradient(135deg,${c.accent},${c.accent}CC)"><span class="fi">⭐</span><div><div class="fl" style="color:#666">Fact</div><div class="ft" style="color:#333">${c.fact}</div></div></div>`;
h+=`<div class="fc fk"><span class="fi">🐱</span><div><div class="fl">Fluff</div><div class="ft" style="font-style:italic">${c.fluff}</div></div></div>`;
h+=`<div class="fc fj"><span class="fi">🇯🇵</span><div><div class="fl">Japan</div><div class="ft">${c.japan}</div></div></div>`;
const pd=dd[c.id+'-p'],sd=dd[c.id+'-s'];
h+=`<div class="cd"><div class="sl" style="color:#228b22">🏋️ Drills</div><button class="dr" onclick="td('${c.id}-p')" style="background:${pd?'#dcfce7':'#f0fdf4'};color:#166534;border-color:${pd?'#22c55e':'#bbf7d0'}"><span style="font-size:12px">${pd?'✅':'🤝'}</span><div><div class="dl" style="color:#15803d">Partner</div>${c.pdrill}</div></button><button class="dr" onclick="td('${c.id}-s')" style="background:${sd?'#fef3c7':'#fffbeb'};color:#92400e;border-color:${sd?'#f59e0b':'#fde68a'}"><span style="font-size:12px">${sd?'✅':'🥋'}</span><div><div class="dl" style="color:#b45309">Solo</div>${c.sdrill}</div></button></div>`;
if(c.quiz&&c.quiz.length){const s=qsc(c.id);
h+=`<div class="qs" style="border-color:${c.color}"><div class="qtl" style="color:${c.color}">📝 Chapter Test</div><div class="qsb">Score 10/10 to unlock next chapter!</div>`;
if(passed[c.id]){h+=`<div style="text-align:center;padding:14px"><div style="font-size:44px;animation:pulse 1s infinite">🏆</div><div style="font-family:'Lilita One',cursive;font-size:15px;color:#166534;margin-top:4px">PASSED! ${s.ok}/${s.t}</div><div style="font-size:10px;color:#666;margin-top:2px">Next chapter unlocked!</div><button onclick="rq('${c.id}')" style="margin-top:6px;border:none;background:#e5e7eb;padding:5px 10px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit">Retake</button></div>`}else{
if(s.d>0)h+=`<div style="text-align:center;margin-bottom:6px"><span style="font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;background:${s.ok===s.d?'#dcfce7;color:#166534':'#fee2e2;color:#991b1b'}">${s.ok}/${s.d} correct${s.d===s.t&&s.ok<s.t?' — Need 10/10!':''}</span></div>`;
if(s.d===s.t&&s.ok<s.t)h+=`<div style="text-align:center;margin-bottom:8px"><button onclick="rq('${c.id}')" style="border:none;background:${c.color};color:#fff;padding:7px 14px;border-radius:7px;font-family:'Lilita One',cursive;font-size:11px;cursor:pointer">🔄 Try Again!</button></div>`;
c.quiz.forEach((qq,qi)=>{const k=c.id+'-'+qi,ans=qa[k];
h+=`<div class="qq">Q${qi+1}. ${qq.q}</div>`;
qq.a.forEach((aa,ai)=>{const isA=ans!==undefined,isC=ai===qq.c,isW=ai===ans&&!isC;
h+=`<div class="qa ${isA?(isC?'ok':(isW?'no':'ds')):''}" onclick="aq('${c.id}',${qi},${ai})">${aa}</div>`})})}
h+=`</div>`}
h+=`</div>`;
const nu=ac<CH.length-1&&ul(ac+1);
h+=`<div class="bn"><button class="ar" ${ac===0?'disabled':''} onclick="nv(${ac-1})" style="background:${ac===0?'#d1d5db':c.color}">‹</button><div class="dts">`;
CH.forEach((_,i)=>{const u=ul(i);h+=`<button class="dt" onclick="${u?'nv('+i+')':''}" style="width:${i===ac?'14px':'4px'};background:${i===ac?c.color:u?c.color+'25':'#e5e7eb'}"></button>`});
h+=`</div><button class="ar" ${nu?'':'disabled'} onclick="nv(${ac+1})" style="background:${nu?c.color:'#d1d5db'}">›</button></div>`;
a.innerHTML=h;
document.querySelector('meta[name="theme-color"]').content=c.color;
if(keep){const ct2=document.getElementById('ct');if(ct2)ct2.scrollTop=sp}}
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:1});
document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>60){const n=d<0?ac+1:ac-1;if(n>=0&&n<CH.length&&ul(n))nv(n)}},{passive:1});
rn();
</script></body></html>

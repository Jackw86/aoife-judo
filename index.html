<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7C3AED"><title>Aoife's Judo Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:#fefefe;color:#333;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes bigReveal{0%{transform:scale(0) rotate(-20deg);opacity:0}50%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fluffHappy{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-3deg)}75%{transform:translateY(-5px) rotate(3deg)}}
@keyframes fluffSad{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes screenShake{0%,100%{transform:translate(0)}10%{transform:translate(-3px,2px)}30%{transform:translate(3px,-2px)}50%{transform:translate(-2px,3px)}70%{transform:translate(2px,-1px)}90%{transform:translate(-1px,2px)}}
@keyframes starBurst{0%{transform:scale(0);opacity:1}50%{transform:scale(1.5);opacity:.8}100%{transform:scale(0);opacity:0}}

/* Header */
.hdr{padding:8px 12px;display:flex;align-items:center;gap:6;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:3px solid;flex-shrink:0;z-index:10}
.hbtn{cursor:pointer;border:none;color:#fff;border-radius:8px;padding:5px 9px;font-family:'Lilita One',cursive;font-size:10px;display:flex;align-items:center;gap:3;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.hbtn:active{transform:scale(.95)}
.ht{flex:1;text-align:center;font-family:'Lilita One',cursive;font-size:10px}
.pr{position:relative;width:32px;height:32px;flex-shrink:0}
.pr svg{width:32px;height:32px}
.pr .l{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:8px}

/* Overlay/Nav */
.ov{position:absolute;inset:0;z-index:100}.ob{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.np{position:relative;z-index:1;background:#fff;border-radius:0 0 16px 16px;max-height:85dvh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideDown .2s}
.nh{padding:10px 12px 4px;font-family:'Lilita One',cursive;font-size:15px;color:#333}
.nl{padding:2px 8px 10px;display:flex;flex-direction:column;gap:2px}
.ni{cursor:pointer;border:none;border-radius:8px;text-align:left;padding:7px 10px;font-family:'Nunito',sans-serif}
.ni:active{transform:scale(.97)}.ni.lk{opacity:.3;pointer-events:none}
.nr{display:flex;align-items:center;gap:6;font-weight:800;font-size:11px}
.nmenu{display:flex;gap:4px;padding:4px 8px 8px;flex-wrap:wrap}
.nmenu button{flex:1;min-width:70px;cursor:pointer;border:2px solid #e5e7eb;background:#fff;border-radius:8px;padding:8px 4px;font-family:'Lilita One',cursive;font-size:9px;text-align:center;color:#666}
.nmenu button:active{transform:scale(.95)}

/* Content area */
.ct{flex:1;overflow-y:auto;padding:12px 10px 95px}.ct::-webkit-scrollbar{width:3px}.ct::-webkit-scrollbar-thumb{background:rgba(0,0,0,.06);border-radius:2px}
.sl-l{animation:slideLeft .3s ease}.sl-r{animation:slideRight .3s ease}

/* Chapter header */
.chd{border-radius:16px;padding:16px 14px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden}
.chd .bi{position:absolute;top:-8px;right:-8px;font-size:60px;opacity:.1;transform:rotate(15deg)}
.chd .cn{font-size:8px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.chd .tt{font-family:'Lilita One',cursive;font-size:18px;line-height:1.15;margin-bottom:2px}
.chd .st{font-size:10px;opacity:.9;font-weight:600}

/* Cards */
.cd{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ci{font-size:12px;line-height:1.6;font-weight:600;color:#444;border-left:3px solid;padding-left:10px}
.at{background:linear-gradient(135deg,#fdf2f8,#fce7f3);border:2px solid #f9a8d4;border-radius:10px;padding:8px 12px;margin-bottom:8px;font-size:11px;font-weight:700;color:#9d174d;line-height:1.4}
.at .al{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#be185d;margin-bottom:1px}
.bt{font-size:11.5px;line-height:1.6;font-weight:500;color:#444;margin-bottom:3px}.bt b{color:#111;font-weight:800}.bt u{text-decoration:none;color:#1d4ed8;font-weight:700}

/* Steps */
.stl{font-family:'Lilita One',cursive;font-size:12px;margin-bottom:5px;display:flex;align-items:center;gap:4}
.sbg{font-size:8px;font-family:'Nunito',sans-serif;font-weight:700;padding:1px 5px;border-radius:4px}
.si{display:flex;align-items:flex-start;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;margin-bottom:2px}
.si:active{transform:scale(.98)}
.sx{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:900;margin-top:1px}
.se{font-size:10.5px;font-weight:600;line-height:1.4}.se.dn{color:#aaa;text-decoration:line-through}

/* Facts */
.fc{border-radius:10px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8}
.fc .fi{font-size:18px;flex-shrink:0}.fc .fl{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:1px}
.fc .ft{font-size:10.5px;font-weight:700;line-height:1.3}
.fk{background:#1a1a2e;color:#fff}.fk .fl{color:#a78bfa}
.fj{background:linear-gradient(135deg,#DC2626,#B91C1C);color:#fff}.fj .fl{color:#FCA5A5}

/* Drills */
.dr{cursor:pointer;border-radius:6px;padding:6px 8px;font-family:inherit;font-size:9.5px;font-weight:700;text-align:left;width:100%;display:flex;align-items:center;gap:6;margin-bottom:3px;border:2px solid}
.dr:active{transform:scale(.98)}.dl{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:1px}

/* Quiz */
.qs{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:3px solid}
.qtl{font-family:'Lilita One',cursive;font-size:13px;text-align:center}
.qsb{font-size:9px;font-weight:600;color:#666;text-align:center;margin-bottom:8px}
.qq{font-weight:800;font-size:11px;margin:8px 0 3px;color:#333}
.qa{cursor:pointer;border:2px solid #e5e7eb;border-radius:6px;padding:7px 9px;margin-bottom:3px;font-size:10.5px;font-weight:700;transition:all .15s}
.qa:active{transform:scale(.98)}.qa.ok{background:#dcfce7;border-color:#22c55e;color:#166534;pointer-events:none}
.qa.no{background:#fee2e2;border-color:#ef4444;color:#991b1b;animation:shake .4s;pointer-events:none}
.qa.ds{pointer-events:none;opacity:.4}

/* Fluff reactions */
.fluff-happy{animation:fluffHappy .5s ease 2}
.fluff-sad{animation:fluffSad .5s ease 2}
.fluff-react{position:fixed;bottom:100px;right:10px;z-index:50;font-size:28px;pointer-events:none;transition:all .3s}
.fluff-speech{position:fixed;bottom:135px;right:5px;z-index:50;background:#fff;border:2px solid #a78bfa;border-radius:10px;padding:4px 8px;font-size:9px;font-weight:700;color:#7c3aed;max-width:120px;pointer-events:none;animation:fadeIn .3s}

/* Capybara */
.cap{background:linear-gradient(135deg,#fde68a,#fbbf24);border:4px solid #f59e0b;border-radius:18px;padding:16px;margin-bottom:10px;text-align:center;animation:bigReveal .6s}
.cap .em{font-size:50px;animation:pulse 1.5s infinite}.cap h2{font-family:'Lilita One',cursive;font-size:16px;color:#92400e;margin:4px 0 2px}
.cap p{font-size:10px;color:#a16207;font-weight:600}

/* Bottom nav */
.bn{position:absolute;bottom:0;left:0;right:0;padding:6px 10px 10px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(255,255,255,.98) 60%,transparent);z-index:10}
.ar{cursor:pointer;border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;box-shadow:0 2px 6px rgba(0,0,0,.08);color:#fff}
.ar:active{transform:scale(.9)}.ar:disabled{opacity:.3}
.dts{display:flex;gap:2px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:55%}
.dot{height:5px;border-radius:3px;border:none;cursor:pointer;transition:width .3s,background .3s}

/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;top:-10px;z-index:200;border-radius:2px;animation:confetti-fall 2.5s ease-out forwards;pointer-events:none}

/* Home screen / Dojo */
.dojo{padding:16px 12px;animation:fadeIn .4s}
.dojo-hello{font-family:'Lilita One',cursive;font-size:22px;color:#7C3AED;margin-bottom:4px}
.dojo-sub{font-size:12px;font-weight:600;color:#666;margin-bottom:14px}
.countdown{background:linear-gradient(135deg,#7C3AED,#6D28D9);border-radius:14px;padding:14px;color:#fff;text-align:center;margin-bottom:12px}
.countdown .days{font-family:'Lilita One',cursive;font-size:36px}
.countdown .label{font-size:10px;font-weight:700;opacity:.8}
.daily-tip{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #f59e0b}
.daily-tip .dtl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#f59e0b;margin-bottom:2px}
.daily-tip .dtt{font-size:11px;font-weight:600;color:#444;line-height:1.5}
.streak{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:10}
.streak-num{font-family:'Lilita One',cursive;font-size:28px;color:#EF4444}
.streak-info{font-size:10px;font-weight:700;color:#666;line-height:1.4}
.streak-btn{cursor:pointer;border:none;background:#22c55e;color:#fff;border-radius:8px;padding:8px 14px;font-family:'Lilita One',cursive;font-size:11px;margin-left:auto}
.streak-btn:active{transform:scale(.95)}
.streak-btn.done{background:#e5e7eb;color:#999}
.dojo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dojo-card{cursor:pointer;background:#fff;border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid #e5e7eb}
.dojo-card:active{transform:scale(.97)}
.dojo-card .em{font-size:28px;margin-bottom:4px}
.dojo-card .nm{font-family:'Lilita One',cursive;font-size:11px;color:#333}
.dojo-card .ds{font-size:9px;color:#888;font-weight:600}

/* Games */
.game-screen{padding:16px 12px}
.game-title{font-family:'Lilita One',cursive;font-size:20px;text-align:center;margin-bottom:10px}
.match-container{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.match-item{background:#fff;border:2px solid #e5e7eb;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.match-item:active{transform:scale(.97)}
.match-item.selected{border-color:#7C3AED;background:#EDE9FE}
.match-item.correct{border-color:#22c55e;background:#dcfce7}
.match-item.wrong{border-color:#ef4444;background:#fee2e2;animation:shake .4s}
.match-target{display:flex;flex-direction:column;gap:6px}
.match-target-item{background:#f8f9fa;border:2px dashed #d1d5db;border-radius:10px;padding:10px;font-size:11px;font-weight:600;color:#666;cursor:pointer;transition:all .2s;min-height:40px;display:flex;align-items:center}
.match-target-item:active{transform:scale(.97)}
.match-target-item.filled{border-style:solid;border-color:#7C3AED;color:#333;background:#EDE9FE}
.match-target-item.correct{border-color:#22c55e;background:#dcfce7;color:#166534}
.match-target-item.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}

.speed-timer{font-family:'Lilita One',cursive;font-size:32px;text-align:center;color:#EF4444;margin-bottom:8px}
.speed-best{font-size:10px;font-weight:700;color:#888;text-align:center;margin-bottom:10px}

/* Fluff game */
.fluff-game{position:relative;width:100%;height:300px;background:linear-gradient(to bottom,#87CEEB,#90EE90);border-radius:14px;overflow:hidden;margin-bottom:10px;touch-action:none}
.fluff-game .mouse{position:absolute;font-size:24px;cursor:pointer;transition:none;animation:bounce .6s infinite}
.fluff-game .mouse:active{transform:scale(0)}
.fluff-game .score{position:absolute;top:8px;right:10px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.3)}
.fluff-game .timer{position:absolute;top:8px;left:10px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.3)}
.fluff-game .cat{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:36px}

/* Stats */
.stat-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6}
.stat-row:last-child{border:none}
.stat-label{font-size:11px;font-weight:600;color:#666}
.stat-value{font-family:'Lilita One',cursive;font-size:14px;color:#333}

/* Dad message */
.dad-msg{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #60a5fa;border-radius:14px;padding:16px;margin-bottom:10px;text-align:center}
.dad-msg .em{font-size:32px;margin-bottom:6px}
.dad-msg h3{font-family:'Lilita One',cursive;font-size:14px;color:#1e40af;margin-bottom:6px}
.dad-msg p{font-size:11px;font-weight:600;color:#1e3a5f;line-height:1.5}
</style>
</head><body><div id="app"></div>
<script src="data.js"></script>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// State
let view='dojo',ac=0,cs={},dd={},sn=0,qa={},passed={},sp=0,slideDir='l',fluffMsg='',fluffTimer=null;
let streak={count:0,last:'',best:0};
let speedBest=Infinity;
let gameState={};
function ld(){try{const s=localStorage.getItem('aj10');if(s){const d=JSON.parse(s);cs=d.c||{};dd=d.d||{};qa=d.q||{};passed=d.p||{};streak=d.st||{count:0,last:'',best:0};speedBest=d.sb||Infinity}}catch(e){}}
function sv(){try{localStorage.setItem('aj10',JSON.stringify({c:cs,d:dd,q:qa,p:passed,st:streak,sb:speedBest}))}catch(e){}}
function rst(){if(confirm('Reset ALL progress?')){localStorage.removeItem('aj10');location.reload()}}
ld();

// Helpers
function ul(i){return i===0||!!passed[CH[i-1].id]}
function qsc(cid){const c=CH.find(x=>x.id===cid);if(!c?.quiz)return{d:0,ok:0,t:0};let d=0,ok=0;c.quiz.forEach((_,i)=>{const k=cid+'-'+i;if(qa[k]!==undefined){d++;if(qa[k]===c.quiz[i].c)ok++}});return{d,ok,t:c.quiz.length}}
function gp(){let t=0,d=0;CH.forEach(c=>{t+=c.steps.length+2;d+=(cs[c.id]||[]).length+(dd[c.id+'-p']?1:0)+(dd[c.id+'-s']?1:0)});return Math.round((d/t)*100)}
function daysToVenray(){return Math.max(0,Math.ceil((new Date('2026-06-20')-new Date())/(1000*60*60*24)))}
function dailyTip(){const tips=CH.flatMap(c=>[c.fact,c.fluff]);const day=Math.floor(Date.now()/(1000*60*60*24));return tips[day%tips.length]}
function allPassed(){return CH.every(x=>!!passed[x.id])}

// Confetti
function confetti(){const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6B9D','#C084FC'];for(let i=0;i<40;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'%';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.animationDelay=Math.random()*.5+'s';el.style.animationDuration=(2+Math.random()*1.5)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),4000)}}

// Fluff
function showFluff(msg,happy){fluffMsg=msg;clearTimeout(fluffTimer);rn(1);fluffTimer=setTimeout(()=>{fluffMsg='';rn(1)},2500)}

// Chapter actions
function ts(id,i){if(!cs[id])cs[id]=[];const a=cs[id],x=a.indexOf(i);if(x===-1)a.push(i);else a.splice(x,1);sv();rn(1)}
function td(k){dd[k]=!dd[k];sv();rn(1)}
function nv(i){if(i===ac||i<0||i>=CH.length||!ul(i))return;slideDir=i>ac?'l':'r';ac=i;sn=0;view='chapter';rn();document.getElementById('ct')?.scrollTo({top:0})}
function aq(ci,qi,ai){if(qa[ci+'-'+qi]!==undefined)return;qa[ci+'-'+qi]=ai;const c=CH.find(x=>x.id===ci);const isCorrect=ai===c.quiz[qi].c;if(isCorrect)showFluff('Correct! 🎉',1);else showFluff('Try again next time!',0);const s=qsc(ci);if(s.d===s.t&&s.ok===s.t){passed[ci]=true;confetti();showFluff('TEST PASSED!! 🏆🎉',1)}sv();rn(1)}
function rq(ci){CH.find(x=>x.id===ci)?.quiz?.forEach((_,i)=>{delete qa[ci+'-'+i]});delete passed[ci];sv();rn(1)}

// Training streak
function logTraining(){const today=new Date().toDateString();if(streak.last===today)return;const yesterday=new Date(Date.now()-86400000).toDateString();if(streak.last===yesterday)streak.count++;else if(streak.last!==today)streak.count=1;streak.last=today;if(streak.count>streak.best)streak.best=streak.count;sv();showFluff('Training logged! 💪',1);rn(1)}

// ===== RENDER =====
function rn(keep){
const ct=document.getElementById('ct');if(keep&&ct)sp=ct.scrollTop;
const a=document.getElementById('app');
let h='';

if(view==='dojo') h=renderDojo();
else if(view==='chapter') h=renderChapter();
else if(view==='stats') h=renderStats();
else if(view==='match-game') h=renderMatchGame();
else if(view==='speed-quiz') h=renderSpeedQuiz();
else if(view==='fluff-game') h=renderFluffGame();
else if(view==='nav') h=renderNav();

// Fluff reaction
if(fluffMsg){
h+=`<div class="fluff-speech">${fluffMsg}</div>`;
h+=`<div class="fluff-react">${fluffMsg.includes('!')&&!fluffMsg.includes('again')?'😺':'😿'}</div>`}

a.innerHTML=h;
if(keep&&view==='chapter'){const ct2=document.getElementById('ct');if(ct2)ct2.scrollTop=sp}
}

// ===== DOJO (Home Screen) =====
function renderDojo(){
const p=gp(),days=daysToVenray(),tip=dailyTip(),today=new Date().toDateString(),trained=streak.last===today;
let h=`<div style="flex:1;overflow-y:auto"><div class="dojo">`;
// Greeting
h+=`<div style="display:flex;align-items:center;justify-content:space-between"><div><div class="dojo-hello">Hi Aoife! 🥋</div><div class="dojo-sub">Let's get ready for Venray!</div></div><div style="font-size:40px;animation:bounce 2s infinite">🐱</div></div>`;
// Golden capybara
if(allPassed())h+=`<div class="cap"><div class="em">🏆🐹🏆</div><h2>GOLDEN CAPYBARA!</h2><p>You completed EVERYTHING!</p></div>`;
// Countdown
h+=`<div class="countdown"><div class="days">${days}</div><div class="label">DAYS UNTIL VENRAY 🇳🇱</div></div>`;
// Training streak
h+=`<div class="streak"><div><div class="streak-num">🔥 ${streak.count}</div></div><div class="streak-info">Day streak!<br>Best: ${streak.best} days</div><button class="streak-btn ${trained?'done':''}" onclick="${trained?'':'logTraining()'}">${trained?'✅ Done today!':'I trained today!'}</button></div>`;
// Daily tip
h+=`<div class="daily-tip"><div class="dtl">💡 Today's Tip</div><div class="dtt">${tip}</div></div>`;
// Progress
h+=`<div class="cd" style="text-align:center"><div style="font-family:'Lilita One',cursive;font-size:13px;color:#7C3AED;margin-bottom:4px">Progress: ${Object.keys(passed).length}/${CH.length} chapters passed</div><div style="background:#e5e7eb;border-radius:6px;height:10px;overflow:hidden"><div style="background:#7C3AED;height:100%;width:${(Object.keys(passed).length/CH.length*100)}%;border-radius:6px;transition:width .5s"></div></div></div>`;
// Grid
h+=`<div class="dojo-grid">`;
h+=`<div class="dojo-card" onclick="view='chapter';ac=0;rn()"><div class="em">📖</div><div class="nm">Chapters</div><div class="ds">${Object.keys(passed).length}/${CH.length} passed</div></div>`;
h+=`<div class="dojo-card" onclick="view='match-game';startMatchGame();rn()"><div class="em">🎯</div><div class="nm">Throw Match</div><div class="ds">Match the names!</div></div>`;
h+=`<div class="dojo-card" onclick="view='speed-quiz';startSpeedQuiz();rn()"><div class="em">⏱️</div><div class="nm">Speed Quiz</div><div class="ds">Best: ${speedBest<Infinity?(speedBest/1000).toFixed(1)+'s':'--'}</div></div>`;
h+=`<div class="dojo-card" onclick="view='fluff-game';startFluffGame();rn()"><div class="em">🐱</div><div class="nm">Fluff's Hunt</div><div class="ds">Catch mice!</div></div>`;
h+=`<div class="dojo-card" onclick="view='stats';rn()"><div class="em">📊</div><div class="nm">Stats</div><div class="ds">Your progress</div></div>`;
h+=`<div class="dojo-card" onclick="rst()"><div class="em">🔄</div><div class="nm">Reset</div><div class="ds">Start over</div></div>`;
h+=`</div>`;
// Dad's message (only shows when all passed)
if(allPassed()){h+=`<div class="dad-msg"><div class="em">💌</div><h3>A Message From Dad</h3><p>Aoife, I am so incredibly proud of you. You've worked so hard to get here. Go out there at Venray and show them what you're made of. Win or lose, you're already a champion in my eyes. I love you. ❤️</p></div>`}
h+=`</div></div>`;
return h}

// ===== CHAPTER =====
function renderChapter(){
const c=CH[ac],dn=cs[c.id]||[];
let h=`<div class="hdr" style="border-bottom-color:${c.color}"><button class="hbtn" style="background:${c.color}" onclick="view='dojo';rn()">🏠</button><button class="hbtn" style="background:${c.color}" onclick="sn=1;rn()">📖</button><div class="ht" style="color:${c.color}">${c.title}</div><div class="pr"><svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="12" fill="none" stroke="#e5e7eb" stroke-width="2.5"/><circle cx="16" cy="16" r="12" fill="none" stroke="${c.color}" stroke-width="2.5" stroke-dasharray="${(gp()/100)*75.4} 75.4" stroke-linecap="round" transform="rotate(-90 16 16)"/></svg><div class="l" style="color:${c.color}">${gp()}%</div></div></div>`;
// Nav overlay
if(sn){h+=`<div class="ov"><div class="ob" onclick="sn=0;rn()"></div><div class="np"><div class="nh">📖 Chapters</div><div class="nl">`;
CH.forEach((x,i)=>{const u=ul(i),v=i===ac,ps=passed[x.id];h+=`<button class="ni ${u?'':'lk'}" onclick="nv(${i})" style="background:${v?`linear-gradient(135deg,${x.color},${x.color}CC)`:x.color+'10'};color:${v?'#fff':'#333'}"><div class="nr"><span style="font-size:13px">${u?x.icon:'🔒'}</span><span style="flex:1;font-size:10px">${x.title}</span>${ps?'✅':''}</div></button>`});
h+=`</div></div></div>`}
// Content
h+=`<div id="ct" class="ct sl-${slideDir}">`;
h+=`<div class="chd" style="background:linear-gradient(135deg,${c.color},${c.color}DD)"><div class="bi">${c.icon}</div><div class="cn">Chapter ${ac+1}/${CH.length}</div><div class="tt">${c.icon} ${c.title}</div><div class="st">${c.subtitle}</div></div>`;
if(passed[c.id])h+=`<div style="background:#dcfce7;border:2px solid #22c55e;border-radius:10px;padding:10px;text-align:center;margin-bottom:8px;font-family:'Lilita One',cursive;font-size:12px;color:#166534;animation:bigReveal .4s">✅ CHAPTER PASSED!</div>`;
h+=`<div class="cd ci" style="border-left-color:${c.color}">${c.intro}</div>`;
if(c.aoife)h+=`<div class="at"><div class="al">📣 Aoife!</div>${c.aoife}</div>`;
if(c.body?.length){h+=`<div class="cd">`;c.body.forEach(ln=>{h+=ln===''?'<div style="height:6px"></div>':`<div class="bt">${ln}</div>`});h+=`</div>`}
h+=`<div class="cd"><div class="stl" style="color:${c.color}">✅ I Understand <span class="sbg" style="background:${c.color}15;color:${c.color}">${dn.length}/${c.steps.length}</span></div>`;
c.steps.forEach((s,i)=>{const d=dn.includes(i);h+=`<div class="si" onclick="ts('${c.id}',${i})" style="background:${d?c.color+'10':'#f8f9fa'};border:2px solid ${d?c.color:'transparent'}"><div class="sx" style="border-color:${d?c.color:'#ccc'};background:${d?c.color:'transparent'}">${d?'✓':''}</div><span class="se${d?' dn':''}">${s}</span></div>`});
h+=`</div>`;
h+=`<div class="fc" style="background:linear-gradient(135deg,${c.accent},${c.accent}CC)"><span class="fi">⭐</span><div><div class="fl" style="color:#666">Fact</div><div class="ft" style="color:#333">${c.fact}</div></div></div>`;
h+=`<div class="fc fk"><span class="fi">🐱</span><div><div class="fl">Fluff</div><div class="ft" style="font-style:italic">${c.fluff}</div></div></div>`;
h+=`<div class="fc fj"><span class="fi">🇯🇵</span><div><div class="fl">Japan</div><div class="ft">${c.japan}</div></div></div>`;
const pd=dd[c.id+'-p'],sd=dd[c.id+'-s'];
h+=`<div class="cd"><div class="stl" style="color:#228b22">🏋️ Drills</div><button class="dr" onclick="td('${c.id}-p')" style="background:${pd?'#dcfce7':'#f0fdf4'};color:#166534;border-color:${pd?'#22c55e':'#bbf7d0'}"><span style="font-size:11px">${pd?'✅':'🤝'}</span><div><div class="dl" style="color:#15803d">Partner</div>${c.pdrill}</div></button><button class="dr" onclick="td('${c.id}-s')" style="background:${sd?'#fef3c7':'#fffbeb'};color:#92400e;border-color:${sd?'#f59e0b':'#fde68a'}"><span style="font-size:11px">${sd?'✅':'🥋'}</span><div><div class="dl" style="color:#b45309">Solo</div>${c.sdrill}</div></button></div>`;
// Quiz
if(c.quiz?.length){const s=qsc(c.id);
h+=`<div class="qs" style="border-color:${c.color}"><div class="qtl" style="color:${c.color}">📝 Chapter Test</div><div class="qsb">10/10 to unlock next chapter!</div>`;
if(passed[c.id]){h+=`<div style="text-align:center;padding:12px"><div style="font-size:40px;animation:pulse 1s infinite">🏆</div><div style="font-family:'Lilita One',cursive;font-size:14px;color:#166534;margin-top:4px">PASSED! ${s.ok}/${s.t}</div><button onclick="rq('${c.id}')" style="margin-top:6px;border:none;background:#e5e7eb;padding:4px 10px;border-radius:5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit">Retake</button></div>`}else{
if(s.d>0)h+=`<div style="text-align:center;margin-bottom:6px"><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:${s.ok===s.d?'#dcfce7;color:#166534':'#fee2e2;color:#991b1b'}">${s.ok}/${s.d}${s.d===s.t&&s.ok<s.t?' — Need 10/10!':''}</span></div>`;
if(s.d===s.t&&s.ok<s.t)h+=`<div style="text-align:center;margin-bottom:6px"><button onclick="rq('${c.id}')" style="border:none;background:${c.color};color:#fff;padding:6px 12px;border-radius:6px;font-family:'Lilita One',cursive;font-size:10px;cursor:pointer">🔄 Try Again!</button></div>`;
c.quiz.forEach((qq,qi)=>{const k=c.id+'-'+qi,ans=qa[k];h+=`<div class="qq">Q${qi+1}. ${qq.q}</div>`;
qq.a.forEach((aa,ai)=>{const isA=ans!==undefined,isC=ai===qq.c,isW=ai===ans&&!isC;
h+=`<div class="qa ${isA?(isC?'ok':(isW?'no':'ds')):''}" onclick="aq('${c.id}',${qi},${ai})">${aa}</div>`})})}
h+=`</div>`}
h+=`</div>`;
// Bottom nav
const nu=ac<CH.length-1&&ul(ac+1);
h+=`<div class="bn"><button class="ar" ${ac===0?'disabled':''} onclick="slideDir='r';nv(${ac-1})" style="background:${ac===0?'#d1d5db':c.color}">‹</button><div class="dts">`;
CH.forEach((_,i)=>{const u=ul(i);h+=`<button class="dot" onclick="${u?'nv('+i+')':''}" style="width:${i===ac?'12px':'4px'};background:${i===ac?c.color:u?c.color+'25':'#e5e7eb'}"></button>`});
h+=`</div><button class="ar" ${nu?'':'disabled'} onclick="slideDir='l';nv(${ac+1})" style="background:${nu?c.color:'#d1d5db'}">›</button></div>`;
return h}

// ===== STATS =====
function renderStats(){
const totalQ=CH.reduce((s,c)=>s+(c.quiz?.length||0),0);
const answeredQ=Object.keys(qa).length;
const correctQ=Object.entries(qa).filter(([k,v])=>{const[cid,qi]=k.split('-');const c=CH.find(x=>x.id===cid);return c?.quiz?.[qi]?.c===v}).length;
let h=`<div class="hdr" style="border-bottom-color:#7C3AED"><button class="hbtn" style="background:#7C3AED" onclick="view='dojo';rn()">🏠 Back</button><div class="ht" style="color:#7C3AED">📊 YOUR STATS</div></div>`;
h+=`<div style="flex:1;overflow-y:auto;padding:12px 10px">`;
h+=`<div class="stat-card"><div style="font-family:'Lilita One',cursive;font-size:14px;color:#7C3AED;margin-bottom:8px">📊 Overall Progress</div>`;
h+=`<div class="stat-row"><span class="stat-label">Chapters Passed</span><span class="stat-value">${Object.keys(passed).length}/${CH.length}</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Questions Answered</span><span class="stat-value">${answeredQ}/${totalQ}</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Correct Answers</span><span class="stat-value">${correctQ} (${answeredQ?Math.round(correctQ/answeredQ*100):0}%)</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Training Streak</span><span class="stat-value">🔥 ${streak.count} days</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Best Streak</span><span class="stat-value">🏆 ${streak.best} days</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Speed Quiz Best</span><span class="stat-value">⏱️ ${speedBest<Infinity?(speedBest/1000).toFixed(1)+'s':'--'}</span></div>`;
h+=`<div class="stat-row"><span class="stat-label">Days to Venray</span><span class="stat-value">🇳🇱 ${daysToVenray()}</span></div>`;
h+=`</div>`;
h+=`<div class="stat-card"><div style="font-family:'Lilita One',cursive;font-size:14px;color:#7C3AED;margin-bottom:8px">📖 Chapter Progress</div>`;
CH.forEach((c,i)=>{const u=ul(i),ps=passed[c.id];
h+=`<div class="stat-row"><span class="stat-label">${u?c.icon:'🔒'} ${c.title}</span><span class="stat-value">${ps?'✅':'${u?"⏳":"🔒"}'}</span></div>`});
h+=`</div></div>`;
return h}

// ===== THROW MATCH GAME =====
const throwPairs=[{jp:'Seoi-nage',en:'Shoulder Throw'},{jp:'O-goshi',en:'Major Hip Throw'},{jp:'Ouchi-gari',en:'Major Inner Reap'},{jp:'Osoto-gari',en:'Major Outer Reap'},{jp:'Tani-otoshi',en:'Valley Drop (Sit Behind!)'},{jp:'De-ashi-barai',en:'Advancing Foot Sweep'},{jp:'Kesa-gatame',en:'Scarf Hold'},{jp:'Mune-gatame',en:'Chest Hold'},{jp:'Yoko-shiho-gatame',en:'Side Four Quarter Hold'}];
function startMatchGame(){gameState={pairs:throwPairs.sort(()=>Math.random()-.5).slice(0,5),answers:{},selected:null,checked:false};rn()}
function renderMatchGame(){
const g=gameState;
let h=`<div class="hdr" style="border-bottom-color:#7C3AED"><button class="hbtn" style="background:#7C3AED" onclick="view='dojo';rn()">🏠 Back</button><div class="ht" style="color:#7C3AED">🎯 THROW MATCH</div></div>`;
h+=`<div style="flex:1;overflow-y:auto;padding:12px 10px"><div class="game-title" style="color:#7C3AED">🎯 Match the Name!</div>`;
h+=`<p style="text-align:center;font-size:10px;font-weight:600;color:#666;margin-bottom:10px">Tap a Japanese name, then tap its English meaning!</p>`;
// Japanese names
h+=`<div style="margin-bottom:10px">`;
g.pairs.forEach((p,i)=>{
const isSel=g.selected===i;const isDone=g.answers[i]!==undefined;
h+=`<div class="match-item ${isSel?'selected':''} ${isDone?(g.answers[i]===true?'correct':'wrong'):''}" onclick="${isDone?'':`selectJP(${i})`}" style="${isDone?'pointer-events:none;opacity:.6':''}">${p.jp} ${isDone?(g.answers[i]?'✅':'❌'):''}</div>`});
h+=`</div>`;
// English targets
h+=`<div style="font-family:'Lilita One',cursive;font-size:11px;color:#666;margin-bottom:4px">👇 Tap the English meaning:</div>`;
const shuffledEN=g.pairs.map((p,i)=>({en:p.en,idx:i})).sort(()=>Math.random()-.5);
h+=`<div class="match-target">`;
shuffledEN.forEach(item=>{
const used=Object.entries(g.answers).some(([k,v])=>v===true&&parseInt(k)===item.idx);
h+=`<div class="match-target-item ${used?'filled':''}" onclick="${g.selected!==null&&!used?`checkMatch(${item.idx})`:''}">${item.en}</div>`});
h+=`</div>`;
// Score
const correct=Object.values(g.answers).filter(v=>v===true).length;
if(correct===g.pairs.length){h+=`<div style="text-align:center;margin-top:12px;animation:bigReveal .5s"><div style="font-size:40px">🎉</div><div style="font-family:'Lilita One',cursive;font-size:16px;color:#166534">ALL MATCHED!</div><button onclick="startMatchGame();rn()" style="margin-top:8px;border:none;background:#7C3AED;color:#fff;padding:8px 16px;border-radius:8px;font-family:'Lilita One',cursive;font-size:11px;cursor:pointer">Play Again!</button></div>`}
h+=`</div>`;
return h}
function selectJP(i){gameState.selected=i;rn()}
function checkMatch(targetIdx){if(gameState.selected===null)return;const correct=gameState.selected===targetIdx;gameState.answers[gameState.selected]=correct;if(correct){showFluff('Correct! 🎉',1)}else{showFluff('Not quite!',0)}gameState.selected=null;rn()}

// ===== SPEED QUIZ =====
let speedStart=0,speedQs=[],speedIdx=0,speedCorrect=0,speedDone=false;
function startSpeedQuiz(){const allQs=CH.flatMap(c=>(c.quiz||[]).map(q=>({...q})));speedQs=allQs.sort(()=>Math.random()-.5).slice(0,10);speedIdx=0;speedCorrect=0;speedDone=false;speedStart=Date.now();rn()}
function renderSpeedQuiz(){
let h=`<div class="hdr" style="border-bottom-color:#EF4444"><button class="hbtn" style="background:#EF4444" onclick="view='dojo';rn()">🏠 Back</button><div class="ht" style="color:#EF4444">⏱️ SPEED QUIZ</div></div>`;
h+=`<div style="flex:1;overflow-y:auto;padding:12px 10px">`;
if(speedDone){
const time=speedEnd-speedStart;
const isBest=time<speedBest;
if(isBest){speedBest=time;sv()}
h+=`<div style="text-align:center;animation:bigReveal .5s"><div style="font-size:48px">${speedCorrect===10?'🏆':'⏱️'}</div><div style="font-family:'Lilita One',cursive;font-size:20px;color:#EF4444;margin:8px 0">${(time/1000).toFixed(1)}s</div><div style="font-size:12px;font-weight:700;color:#666">${speedCorrect}/10 correct</div>${isBest?'<div style="font-family:Lilita One,cursive;font-size:14px;color:#22c55e;margin-top:4px;animation:pulse 1s infinite">🏆 NEW BEST TIME!</div>':''}<button onclick="startSpeedQuiz();rn()" style="margin-top:12px;border:none;background:#EF4444;color:#fff;padding:10px 20px;border-radius:10px;font-family:'Lilita One',cursive;font-size:13px;cursor:pointer">Try Again!</button></div>`}
else{
const elapsed=Math.round((Date.now()-speedStart)/1000);
h+=`<div class="speed-timer">${elapsed}s</div>`;
h+=`<div class="speed-best">Best: ${speedBest<Infinity?(speedBest/1000).toFixed(1)+'s':'--'} | Question ${speedIdx+1}/10</div>`;
const q=speedQs[speedIdx];
h+=`<div class="qq" style="font-size:14px;text-align:center;margin:12px 0">${q.q}</div>`;
q.a.forEach((a,ai)=>{h+=`<div class="qa" onclick="speedAnswer(${ai})" style="padding:12px;font-size:13px">${a}</div>`})}
h+=`</div>`;
return h}
function speedAnswer(ai){if(speedDone)return;if(ai===speedQs[speedIdx].c)speedCorrect++;speedIdx++;if(speedIdx>=10){speedDone=true;speedEnd=Date.now();if(speedCorrect===10)confetti()}rn()}

// ===== FLUFF'S ADVENTURE =====
let fluffScore=0,fluffTime=20,fluffActive=false,fluffInterval=null,fluffMice=[];
function startFluffGame(){fluffScore=0;fluffTime=20;fluffActive=true;fluffMice=[];clearInterval(fluffInterval);spawnMice();fluffInterval=setInterval(()=>{fluffTime--;if(fluffTime<=0){fluffActive=false;clearInterval(fluffInterval)}rn()},1000);rn()}
function spawnMice(){if(!fluffActive)return;const m={id:Date.now(),x:Math.random()*80+5,y:Math.random()*60+10};fluffMice.push(m);setTimeout(()=>{fluffMice=fluffMice.filter(x=>x.id!==m.id);if(fluffActive)rn()},2500);if(fluffActive)setTimeout(spawnMice,800+Math.random()*600)}
function catchMouse(id){fluffMice=fluffMice.filter(m=>m.id!==id);fluffScore++;rn()}
function renderFluffGame(){
let h=`<div class="hdr" style="border-bottom-color:#22c55e"><button class="hbtn" style="background:#22c55e" onclick="fluffActive=false;clearInterval(fluffInterval);view='dojo';rn()">🏠 Back</button><div class="ht" style="color:#22c55e">🐱 FLUFF'S HUNT</div></div>`;
h+=`<div style="flex:1;overflow-y:auto;padding:12px 10px">`;
if(!fluffActive&&fluffTime<=0){
h+=`<div style="text-align:center;animation:bigReveal .5s"><div style="font-size:48px">🐱</div><div style="font-family:'Lilita One',cursive;font-size:20px;color:#22c55e;margin:8px 0">${fluffScore} mice caught!</div><div style="font-size:12px;font-weight:700;color:#666">${fluffScore>=15?'AMAZING! Fluff is impressed!':fluffScore>=10?'Great job!':fluffScore>=5?'Good effort!':'Keep practising!'}</div><button onclick="startFluffGame()" style="margin-top:12px;border:none;background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-family:'Lilita One',cursive;font-size:13px;cursor:pointer">Play Again!</button></div>`}
else if(!fluffActive){
h+=`<div style="text-align:center;padding:40px 0"><div style="font-size:60px;margin-bottom:10px">🐱</div><div style="font-family:'Lilita One',cursive;font-size:18px;color:#22c55e">Fluff's Mouse Hunt!</div><p style="font-size:11px;color:#666;font-weight:600;margin:8px 0">Tap the mice before they escape!<br>20 seconds — how many can you catch?</p><button onclick="startFluffGame()" style="border:none;background:#22c55e;color:#fff;padding:12px 24px;border-radius:10px;font-family:'Lilita One',cursive;font-size:14px;cursor:pointer;margin-top:8px">START!</button></div>`}
else{
h+=`<div class="fluff-game">`;
h+=`<div class="timer">⏱️ ${fluffTime}s</div>`;
h+=`<div class="score">🐭 ${fluffScore}</div>`;
fluffMice.forEach(m=>{h+=`<div class="mouse" onclick="catchMouse(${m.id})" style="left:${m.x}%;top:${m.y}%">🐭</div>`});
h+=`<div class="cat">🐱</div>`;
h+=`</div>`}
h+=`</div>`;return h}

// Swipe for chapters
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:1});
document.addEventListener('touchend',e=>{if(view!=='chapter')return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>60){const n=d<0?ac+1:ac-1;if(n>=0&&n<CH.length&&ul(n)){slideDir=d<0?'l':'r';nv(n)}}},{passive:1});

// Speed quiz timer updater
setInterval(()=>{if(view==='speed-quiz'&&!speedDone&&speedIdx<10){const el=document.querySelector('.speed-timer');if(el)el.textContent=Math.round((Date.now()-speedStart)/1000)+'s'}},200);

rn();
</script>
</body></html>
